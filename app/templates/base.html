<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Xspatula Launcher</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>

<body>

<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">
                <i class="bi bi-diagram-3"></i>
            </div>
            <div>
                <div class="brand-title">Xspatula</div>
                <div class="brand-subtitle">Launcher</div>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-label">Modules</div>

            <div class="sidebar-item active">
                <i class="bi bi-database-add"></i>
                Database
            </div>

            <div class="sidebar-item" onclick="openGame()">
                <i class="bi bi-controller"></i>
                Learning Game
            </div>

            <div class="sidebar-item">
                <i class="bi bi-terminal"></i>
                Logs
            </div>
        </div>
    </aside>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</div>

<div id="loading-overlay" class="loading-overlay d-none">
    <div class="loading-card">
        <div class="spinner-border text-primary" role="status"></div>
        <h4 class="mt-4" id="loading-title">Running...</h4>
        <p id="loading-message">Please wait...</p>
    </div>
</div>

<div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content confirm-modal">
            <div class="modal-header">
                <h5 class="modal-title" id="confirm-title">Confirm Action</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <p id="confirm-message"></p>
                <ul id="confirm-list" class="confirm-list"></ul>
            </div>

            <div class="modal-footer">
                <button class="btn btn-outline-secondary" data-bs-dismiss="modal">
                    Cancel
                </button>

                <button class="btn btn-primary" id="confirm-run-button">
                    Yes, run it
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="gameModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content game-modal">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-controller"></i>
                    Learn Xspatula Architecture
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body p-0">
                <iframe id="game-frame" class="game-frame" src=""></iframe>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
